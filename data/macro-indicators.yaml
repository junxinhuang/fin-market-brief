version: 1
name: macro_asset_opportunity_radar
description: >
  Core macro and cross-asset indicators for long-horizon learning and opportunity
  discovery across USD, China, global risk assets, gold, real estate, and crypto.
  This file is a data dictionary, not a trading signal model.
timezone: Asia/Shanghai
freshness_target: T-1 or latest released observation
display_defaults:
  day: daily or latest close
  week: weekly close or weekly average
  month: monthly observation, YoY when meaningful
  quarter: quarterly observation, annualized or YoY when meaningful
availability_legend:
  stable: Public history is expected to be reliable enough for v1.
  proxy: Use a public proxy or fallback because direct official/free history is limited.
  defer: Keep in the framework, but do not block v1 on this field.
common_transforms:
  yoy: Year-over-year percentage change.
  mom: Month-over-month percentage change.
  qoq_annualized: Quarter-over-quarter annualized rate.
  level: Raw reported level.
  spread: Difference between two rates.
  trend_3m: Latest value versus 3-month moving average or 3-month change.
  percentile_12m: Latest value percentile over trailing 12 months.

indicators:
  - id: us_fed_funds_rate
    priority: 1
    region: US
    theme: rates
    label: Fed Funds Rate
    source: FRED
    source_url: https://fred.stlouisfed.org/series/FEDFUNDS
    series_id: FEDFUNDS
    earliest_expected: "1954"
    source_frequency: month
    display_frequency: month
    transform: level
    availability: stable
    fallback: Federal Reserve H.15
    note: USD policy-rate anchor.

  - id: us_policy_rate_expectations
    priority: 2
    region: US
    theme: rates
    label: "Policy Expectations Proxy: 2Y-Fed Funds Spread"
    source: US Treasury / FRED derived proxy
    source_url: https://home.treasury.gov/resource-center/data-chart-center/interest-rates
    series_id: null
    earliest_expected: "2016 from local Treasury curve cache"
    source_frequency: day
    display_frequency: week
    transform: level
    availability: proxy
    fallback: Fed Funds or SOFR futures implied path if a stable history source is added.
    note: Proxy only; 2Y Treasury yield minus Fed Funds rate reflects policy-cycle expectations, not CME FedWatch meeting probabilities.

