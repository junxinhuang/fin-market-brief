name: Daily Market Brief

on:
  schedule:
    # 09:13 Beijing time. Avoid the top-of-hour GitHub Actions load spike.
    - cron: "13 1 * * *"
    # 09:43 Beijing time fallback. The guard step prevents duplicate reports.
    - cron: "43 1 * * *"
    # 21:10 Beijing time evening report.
    - cron: "10 13 * * *"
    # 21:40 Beijing time evening fallback. The guard step prevents duplicates.
    - cron: "40 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-market-brief
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check whether today's report already exists
        id: daily_guard
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          export TODAY_BJT="$(TZ=Asia/Shanghai date +%F)"
          if [ "$EVENT_SCHEDULE" = "10 13 * * *" ] || [ "$EVENT_SCHEDULE" = "40 13 * * *" ]; then
            export SLOT_NAME="evening"
            export SLOT_START_HM="2100"
            export SLOT_END_HM="2359"
          else
            export SLOT_NAME="morning"
            export SLOT_START_HM="900"
            export SLOT_END_HM="1259"
          fi

          if [ -f reports/daily/latest-summary.json ] && node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('reports/daily/latest-summary.json','utf8')); const hm=Number((s.fileName || '').match(/^\d{4}-\d{2}-\d{2}-(\d{4})-/)?.[1] || 0); const start=Number(process.env.SLOT_START_HM); const end=Number(process.env.SLOT_END_HM); process.exit(s.date === process.env.TODAY_BJT && hm >= start && hm <= end ? 0 : 1)" ; then
            echo "$SLOT_NAME report already exists for $TODAY_BJT; skip scheduled fallback."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No $SLOT_NAME report found for $TODAY_BJT; continue."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate report
        if: steps.daily_guard.outputs.skip != 'true'
        run: node scripts/generate_daily_market_brief.mjs

      - name: Commit generated report
        if: steps.daily_guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/daily/*.html reports/daily/latest-summary.json
          if git diff --cached --quiet; then
            echo "No generated report changes to commit."
          else
            git commit -m "Add daily market brief"
            git push
          fi

      - name: Push Feishu notification
        if: steps.daily_guard.outputs.skip != 'true'
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: node scripts/push_feishu.mjs
