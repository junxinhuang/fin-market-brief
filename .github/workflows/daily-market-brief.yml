name: Daily Market Brief

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-market-brief
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate report
        run: node scripts/generate_daily_market_brief.mjs

      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/daily/*.html reports/daily/latest-summary.json
          if git diff --cached --quiet; then
            echo "No generated report changes to commit."
          else
            git commit -m "Add daily market brief"
            git push
          fi

      - name: Push Feishu notification
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: node scripts/push_feishu.mjs
