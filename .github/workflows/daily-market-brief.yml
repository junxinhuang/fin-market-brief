name: Daily Market Brief

on:
  schedule:
    # Try every 10 minutes during the morning/evening Beijing-time windows.
    # Guard logic below allows only one morning and one evening report per day.
    - cron: "*/10 1 * * *"
    - cron: "0,10,20,30 2 * * *"
    - cron: "*/10 13 * * *"
    - cron: "0,10,20,30 14 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a report even outside the morning/evening windows"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: daily-market-brief
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install macro dependencies
        run: python -m pip install --upgrade pyyaml openpyxl

      - name: Check whether today's report already exists
        id: daily_guard
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule || '' }}
          FORCE_RUN: ${{ inputs.force || 'false' }}
        run: |
          if [ "$EVENT_NAME" != "schedule" ] && [ "$FORCE_RUN" = "true" ]; then
            echo "Force run requested; bypass daily guard."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          export TODAY_BJT="$(TZ=Asia/Shanghai date +%F)"
          export NOW_HM="$(TZ=Asia/Shanghai date +%H%M)"
          if [ "$EVENT_NAME" = "schedule" ]; then
            case "$EVENT_SCHEDULE" in
              "*/10 1 * * *"|"0,10,20,30 2 * * *")
                export SLOT_NAME="morning"
                export SLOT_START_HM="900"
                export SLOT_END_HM="1030"
                ;;
              "*/10 13 * * *"|"0,10,20,30 14 * * *")
                export SLOT_NAME="evening"
                export SLOT_START_HM="2100"
                export SLOT_END_HM="2230"
                ;;
              *)
                echo "Unknown schedule '$EVENT_SCHEDULE'; skip."
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
            echo "Scheduled $SLOT_NAME report for $TODAY_BJT; actual Beijing time is $NOW_HM."
          else
            if [ "$NOW_HM" -ge 2100 ] && [ "$NOW_HM" -le 2230 ]; then
              export SLOT_NAME="evening"
              export SLOT_START_HM="2100"
              export SLOT_END_HM="2230"
            elif [ "$NOW_HM" -ge 900 ] && [ "$NOW_HM" -le 1030 ]; then
              export SLOT_NAME="morning"
              export SLOT_START_HM="900"
              export SLOT_END_HM="1030"
            else
              echo "Current Beijing time $NOW_HM is outside report windows; skip."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if [ -f reports/daily/latest-summary.json ] && node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('reports/daily/latest-summary.json','utf8')); const hm=Number((s.fileName || '').match(/^\d{4}-\d{2}-\d{2}-(\d{4})-/)?.[1] || 0); const start=Number(process.env.SLOT_START_HM); const end=Number(process.env.SLOT_END_HM); process.exit(s.date === process.env.TODAY_BJT && hm >= start && hm <= end ? 0 : 1)" ; then
            echo "$SLOT_NAME report already exists for $TODAY_BJT; skip scheduled fallback."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No $SLOT_NAME report found for $TODAY_BJT; continue."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate report
        if: steps.daily_guard.outputs.skip != 'true'
        env:
          COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}
        run: |
          python scripts/fetch_macro_indicators.py
          python scripts/generate_macro_dashboard.py
          node skills/crypto-quant-analysis/scripts/generate_daily_crypto_decision.mjs
          node scripts/generate_daily_market_brief.mjs

      - name: Commit generated report
        if: steps.daily_guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/macro reports/daily reports/macro/dashboard.html reports/crypto/daily
          if git diff --cached --quiet; then
            echo "No generated report changes to commit."
          else
            git commit -m "Add daily market brief"
            git push
          fi

      - name: Push Feishu notification
        if: steps.daily_guard.outputs.skip != 'true'
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: node scripts/push_feishu.mjs
